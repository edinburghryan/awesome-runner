<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a237e">
  <title>Awesome Runner</title>
  <link rel="icon" type="image/png" href="img/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="img/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icon-180.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <h1>Awesome Runner</h1>
    <p>Training planner for ultramarathons</p>
    <button id="google-signin-btn" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- App -->
  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <div class="header-title">Awesome Runner</div>
        <div class="header-actions">
          <button class="btn-icon" id="btn-theme" title="Toggle dark mode"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg></button>
          <button class="btn-icon" id="btn-settings" title="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
          <button class="btn-icon" id="week-today" title="Go to this week"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="12" cy="15" r="1.5"/></svg></button>
        </div>
      </div>
      <div id="race-countdown" class="race-countdown hidden"></div>
    </header>

    <!-- Main Content -->
    <main class="app-main">

      <!-- My Week Page -->
      <div id="page-week" class="page active">
        <div class="week-nav">
          <button class="btn-nav" id="week-prev">‹</button>
          <div id="week-nav-label" class="week-nav-label" style="position:relative;cursor:pointer;">This Week</div>
          <button class="btn-nav" id="week-next">›</button>
        </div>
        <div id="week-days"></div>
      </div>

      <!-- Races Page -->
      <div id="page-races" class="page">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Races</h2>
        <div id="races-list"></div>
        <button class="btn-add-race" id="btn-add-race">+ Add Race</button>
      </div>

    </main>

    <!-- Tab Bar -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-page="week">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        My Week
      </button>
      <button class="tab-btn" data-page="races">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></span>
        Races
      </button>
    </nav>
  </div>

  <!-- Workout Detail Modal -->
  <div class="modal-overlay hidden" id="workout-detail-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Workout</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="workout-detail-body"></div>
    </div>
  </div>

  <!-- Add Workout Sheet -->
  <div class="modal-overlay hidden" id="add-workout-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Workout</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="add-workout-types">
          <button class="add-type-btn" onclick="App.addCustomWorkout('strength')">
            <span class="type-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="5" y="7" width="3" height="10" rx="1"/><rect x="16" y="7" width="3" height="10" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>Strength
          </button>
          <button class="add-type-btn" onclick="App.addCustomWorkout('yoga')">
            <span class="type-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><path d="M12 8v5"/><path d="M8 18c0-3 2-5 4-5s4 2 4 5"/><path d="M6 18h12"/><path d="M9 11l-3-1M15 11l3-1"/></svg></span>Yoga
          </button>
          <button class="add-type-btn" onclick="App.addCustomWorkout('cycling')">
            <span class="type-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-8h4l3 5M14 9l1-3"/></svg></span>Cycling
          </button>
          <button class="add-type-btn" onclick="App.addCustomWorkout('hiking')">
            <span class="type-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20l4-12 4 6 4-8 4 14"/></svg></span>Hiking
          </button>
          <button class="add-type-btn" onclick="App.addCustomWorkout('canicross')">
            <span class="type-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 20c0-4 1-7 3-9 1.5-1.5 2-3 1.5-5C12 4 11 3 9.5 3 8 3 6.5 4.5 6 7c-.5 2.5-1 4-3 5"/><path d="M14.5 3c1.5 0 3 1 3.5 3 .3 1.5 0 3-1 4.5-1.5 2-2 5-2 7"/><path d="M9 8c1-1 2.5-1 3.5 0"/></svg></span>Canicross
          </button>
        </div>
        <div class="reference-workouts-header">From reference plan</div>
        <div id="reference-workouts-list"></div>
      </div>
    </div>
  </div>

  <!-- Race Form Modal -->
  <div class="modal-overlay hidden" id="race-form-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="race-form-title">Add Race</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Race Name</label>
          <input type="text" id="race-name" placeholder="e.g. Devil o' The Highlands">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="race-date">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="race-type">
            <option value="5k">5K</option>
            <option value="10k">10K</option>
            <option value="half_marathon">Half Marathon</option>
            <option value="marathon">Marathon</option>
            <option value="ultra" selected>Ultra</option>
          </select>
        </div>
        <div class="form-group">
          <label>Distance (km)</label>
          <input type="number" id="race-distance" placeholder="e.g. 68">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea class="notes-field" id="race-notes" placeholder="Optional notes..."></textarea>
        </div>
        <button class="btn-primary" id="race-form-save">Save</button>
        <button class="btn-danger hidden" id="race-form-delete">Delete Race</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay hidden" id="settings-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Current reference plan week (1-23)</label>
          <input type="number" id="settings-ref-week" min="1" max="23" value="1">
          <p style="font-size:11px;color:var(--text-muted);margin-top:4px;">Sets which week of the 80/20 plan maps to this week. Auto-advances from here.</p>
          <p id="settings-end-date" style="font-size:12px;color:var(--primary);margin-top:8px;font-weight:500;"></p>
        </div>
        <button class="btn-primary" id="settings-save">Save</button>
        <div class="settings-row" style="margin-top:16px;">
          <span class="settings-label">Sign out</span>
          <button class="btn-icon" onclick="firebase.auth().signOut();location.reload();" style="font-size:13px;width:auto;padding:4px 12px;border:1px solid var(--border);border-radius:6px;">Sign out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/reference-data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/races.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { Races.init(); });
  </script>
</body>
</html>
